<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Welcome to My DevOps Project</h1>
        <p>Built with HTML, CSS, Docker, Jenkins & AWS</p>

    <section class="card">

        <p>
            This is a simple static website used to demonstrate a complete

        </p>

    <footer>
        <p>© 2026 Giri | DevOps Portfolio</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =

        }
    </script>

</body>
</html>
